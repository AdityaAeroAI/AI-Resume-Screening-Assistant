<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screening Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 2.3rem;
        }

        p {
            color: #ccc;
            margin-bottom: 30px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .tag {
            display: inline-block;
            background: #4cc9f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="tag">AI Powered Hiring Assistant</div>

    <h1>AI Resume Screening Assistant 🤖</h1>
    <p>Analyze candidate profiles and get instant job-fit evaluation</p>
</div>

<flowise-fullchatbot></flowise-fullchatbot>

<script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js"

    Chatbot.initFull({
        chatflowid: "7f90f873-1640-4a91-9860-78c54a28debc",
        apiHost: "https://cloud.flowiseai.com",

        chatflowConfig: {
            systemMessage: "You are a professional AI recruiter that evaluates candidates based on skills, experience, and role requirements."
        },

        theme: {
            button: {
                backgroundColor: "#4cc9f0",
                right: 20,
                bottom: 20,
                size: "large",
                iconColor: "black"
            },

            chatWindow: {
                title: "AI Resume Screening Assistant",
                welcomeMessage: "Hello! 👋 I will help evaluate candidate profiles and suggest job fit. Let's get started!",
                backgroundColor: "#1e1e2f",
                textColor: "#ffffff",
                showTitle: true
            }
        }
    })
</script>

</body>
</html>
